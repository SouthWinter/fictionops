<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">FictionOps quickstart terminal preview</title>
  <desc id="desc">A terminal-style preview showing FictionOps commands for initializing a novel project, planning a chapter, generating a draft brief, and checking project health.</desc>
  <rect width="920" height="500" rx="12" fill="#101418"/>
  <rect x="0" y="0" width="920" height="42" rx="12" fill="#1c232b"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="21" r="6" fill="#28c840"/>
  <text x="86" y="27" fill="#aeb8c2" font-family="Consolas, Menlo, monospace" font-size="14">fictionops quickstart</text>

  <text x="28" y="78" fill="#7ee787" font-family="Consolas, Menlo, monospace" font-size="16">$ fictionops init my-novel --title "My Novel"</text>
  <text x="28" y="108" fill="#d0d7de" font-family="Consolas, Menlo, monospace" font-size="15">Created FictionOps project: my-novel</text>

  <text x="28" y="150" fill="#7ee787" font-family="Consolas, Menlo, monospace" font-size="16">$ fictionops new-chapter my-novel --chapter 001 --title "Chapter One"</text>
  <text x="28" y="180" fill="#d0d7de" font-family="Consolas, Menlo, monospace" font-size="15">Created chapter draft, engine, and retrospective scaffold.</text>

  <text x="28" y="222" fill="#7ee787" font-family="Consolas, Menlo, monospace" font-size="16">$ fictionops plan-chapter my-novel --chapter 001</text>
  <text x="28" y="252" fill="#d0d7de" font-family="Consolas, Menlo, monospace" font-size="15">Updated chapter engine from book outline.</text>

  <text x="28" y="294" fill="#7ee787" font-family="Consolas, Menlo, monospace" font-size="16">$ fictionops draft-brief my-novel --chapter 001</text>
  <text x="28" y="324" fill="#d0d7de" font-family="Consolas, Menlo, monospace" font-size="15">Prepared scene work, context boundaries, and writing constraints.</text>

  <text x="28" y="366" fill="#7ee787" font-family="Consolas, Menlo, monospace" font-size="16">$ fictionops doctor my-novel --book book_01</text>
  <text x="28" y="396" fill="#d0d7de" font-family="Consolas, Menlo, monospace" font-size="15">Project status: needs_attention</text>
  <text x="28" y="424" fill="#d0d7de" font-family="Consolas, Menlo, monospace" font-size="15">Next: fill canon, character memory, information boundaries, and draft text.</text>

  <rect x="28" y="452" width="864" height="1" fill="#30363d"/>
  <text x="28" y="478" fill="#8b949e" font-family="Consolas, Menlo, monospace" font-size="13">FictionOps stages work; humans decide what enters manuscript and canon.</text>
</svg>
